<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Medal Golf</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Medal Golf" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="theme-color" content="#f5f0e8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/search.css" />
  <link rel="stylesheet" href="css/results.css" />
  <link rel="stylesheet" href="css/modal.css" />
</head>
<body>

  <!-- Main view -->
  <div class="app">

    <header class="app-header">
      <h1 class="app-title">Medal Golf</h1>
      <p class="app-sub">Enter your course, see your medals.</p>
    </header>

    <section class="search-section">
      <div class="search-row">
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="9" r="6"/><line x1="14.5" y1="14.5" x2="18" y2="18"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search a course…" autocomplete="off" />
          <div id="searchDropdown" class="search-dropdown hidden"></div>
        </div>
        <button class="add-btn" id="openAddCourse" title="Add course">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Results -->
    <section class="results-section hidden" id="resultsSection">
      <div class="course-info">
        <span class="course-name-label" id="displayCourseName"></span>
        <span class="course-meta" id="displayCourseMeta"></span>
      </div>

      <div class="estimated-warning hidden" id="estimatedWarning">
        <span class="estimated-text">⚠️ These stats are estimated — tap to enter real values.</span>
      </div>

      <div class="handicap-display">
        <span class="handicap-label">Course Handicap</span>
        <span class="handicap-value" id="displayCourseHandicap">—</span>
      </div>

      <div class="medals">
        <div class="medal-row" id="goldRow">
          <span class="medal-emoji">🥇</span>
          <div class="medal-info">
            <span class="medal-tier">Gold</span>
            <span class="medal-range" id="goldRange">—</span>
          </div>
        </div>
        <div class="medal-row" id="silverRow">
          <span class="medal-emoji">🥈</span>
          <div class="medal-info">
            <span class="medal-tier">Silver</span>
            <span class="medal-range" id="silverRange">—</span>
          </div>
        </div>
        <div class="medal-row" id="bronzeRow">
          <span class="medal-emoji">🥉</span>
          <div class="medal-info">
            <span class="medal-tier">Bronze</span>
            <span class="medal-range" id="bronzeRange">—</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Empty state -->
    <section class="empty-state" id="emptyState">
      <span class="empty-icon">⛳</span>
      <p class="empty-text">Search for a course or tap + to add one.</p>
    </section>

  </div>

  <!-- Add Course Modal -->
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" id="addCourseModal">
      <div class="modal-header">
        <h2 class="modal-title">Add Course</h2>
        <button class="modal-close" id="closeModal">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="5" y1="5" x2="15" y2="15"/><line x1="15" y1="5" x2="5" y2="15"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="field-group">
          <label class="field-label" for="fieldName">Course Name</label>
          <input class="field-input" type="text" id="fieldName" placeholder="e.g. St Andrews Links" />
        </div>

        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="fieldHoles">Holes</label>
            <select class="field-input field-select" id="fieldHoles">
              <option value="18">18 holes</option>
              <option value="front9">Front 9</option>
              <option value="back9">Back 9</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="fieldPar">Par</label>
            <input class="field-input" type="number" id="fieldPar" placeholder="72" min="27" max="74" />
          </div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="fieldCR">Course Rating</label>
            <input class="field-input" type="number" id="fieldCR" placeholder="71.2" step="0.1" min="55" max="80" />
          </div>
          <div class="field-group">
            <label class="field-label" for="fieldSR">Slope Rating</label>
            <input class="field-input" type="number" id="fieldSR" placeholder="130" min="55" max="155" />
          </div>
        </div>

        <div class="field-divider"></div>

        <div class="field-group">
          <label class="field-label" for="fieldHI">My Handicap Index</label>
          <input class="field-input" type="number" id="fieldHI" placeholder="14.2" step="0.1" min="0" max="54" />
          <span class="field-hint">This is saved and used for all courses.</span>
        </div>

        <p class="modal-error hidden" id="modalError">Please fill in all fields.</p>

        <button class="submit-btn" id="submitCourse">Save &amp; Calculate</button>
      </div>
    </div>
  </div>

  <!-- Edit Handicap floating button -->
  <button class="hi-edit-btn hidden" id="hiEditBtn" title="Edit handicap index">
    HI <span id="hiEditValue"></span>
  </button>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
<link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/components.css" />
